name: Otomatik APK Uretici
on: [push, workflow_dispatch]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Zip Dosyasini Otomatik Ac
        run: |
          unzip -o "*.zip"
          # Ana projenin yerini build.gradle dosyasına bakarak bulalım
          BG_DIR=$(find . -name "build.gradle" -exec dirname {} \; | head -n 1)
          echo "Proje dizini bulundu: $BG_DIR"
          if [ "$BG_DIR" != "." ] && [ -n "$BG_DIR" ]; then
            mv "$BG_DIR"/* . 2>/dev/null || true
            mv "$BG_DIR"/.* . 2>/dev/null || true
          fi

      - name: Java 17 Kurulumu
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Android APK Derle
        run: |
          if [ -f "gradlew" ]; then
            chmod +x gradlew
            ./gradlew assembleDebug
          else
            echo "gradlew bulunamadi, sistem gradle'i kullaniliyor..."
            gradle assembleDebug
          fi

      - name: APK Dosyasini Paketle
        uses: actions/upload-artifact@v4
        with:
          name: yagmurun-diyet-uygulamasi
          path: "**/build/outputs/apk/debug/app-debug.apk"
          
