name: Otomatik APK Uretici
on: [push, workflow_dispatch]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Zip Dosyasini Otomatik Ac
        run: |
          unzip -o "*.zip"
          dir_name=$(find . -maxdepth 1 -type d ! -name "." ! -name ".github" | head -n 1)
          if [ -n "$dir_name" ]; then
            echo "Proje klasoru bulundu: $dir_name"
            mv "$dir_name"/* . 2>/dev/null || true
            mv "$dir_name"/.* . 2>/dev/null || true
          fi

      - name: Java 17 Kurulumu
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: gradle

      - name: Derleme Iznini Ayarla
        run: |
          chmod +x gradlew 2>/dev/null || true
          chmod +x app/gradlew 2>/dev/null || true

      - name: Android APK Derle
        run: ./gradlew assembleDebug

      - name: APK Dosyasini Paketle
        uses: actions/upload-artifact@v4
        with:
          name: yagmurun-diyet-uygulamasi
          path: app/build/outputs/apk/debug/app-debug.apk
          
